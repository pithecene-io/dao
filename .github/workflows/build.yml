name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM/Clang
        env:
          LLVM_VERSION: 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm-snapshot.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-${LLVM_VERSION} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-${LLVM_VERSION} clang-format-${LLVM_VERSION} clang-tidy-${LLVM_VERSION}
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${LLVM_VERSION} 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${LLVM_VERSION} 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-${LLVM_VERSION} 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-${LLVM_VERSION} 100

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.30"

      - name: Verify CMake version
        run: |
          cmake_version=$(cmake --version | head -1 | grep -oP '\d+\.\d+')
          major=$(echo "$cmake_version" | cut -d. -f1)
          minor=$(echo "$cmake_version" | cut -d. -f2)
          if [ "$major" -lt 3 ] || { [ "$major" -eq 3 ] && [ "$minor" -lt 30 ]; }; then
            echo "CMake version $cmake_version does not meet minimum 3.30"
            exit 1
          fi
          echo "CMake version $cmake_version satisfies >= 3.30"

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', 'profiles/clang-21-debug.lock') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Detect Clang version
        id: clang
        run: |
          version=$(clang++-21 --version | grep -oP 'clang version \K\d+')
          echo "major=$version" >> "$GITHUB_OUTPUT"
          echo "Detected clang major version: $version"

      - name: Install dependencies
        run: |
          conan install . \
            --output-folder=build/debug \
            --build=missing \
            -pr profiles/clang-21-debug \
            -pr:b profiles/clang-21-debug \
            -s compiler.version=${{ steps.clang.outputs.major }} \
            -s:b compiler.version=${{ steps.clang.outputs.major }} \
            --lockfile=profiles/clang-21-debug.lock

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build build/debug

      - name: Run tests
        run: ctest --test-dir build/debug --output-on-failure

      - name: Verify daoc runs
        run: ./build/debug/compiler/driver/daoc examples/hello.dao

      - name: Check formatting
        run: |
          find compiler tools -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

      - name: Run clang-tidy
        run: |
          find compiler tools -name '*.cpp' | xargs clang-tidy -p build/debug
